name: Build & push Docker image (GHCR)

on:
  release:
    types:
      - published
  workflow_dispatch:

concurrency:
  group: build-and-push-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      REGISTRY: ghcr.io
      COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
      COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
    outputs:
      image_digest: ${{ steps.build-and-push.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set image metadata env
        id: image-env
        run: |
          OWNER_LC="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
          echo "owner_lc=${OWNER_LC}" >> "$GITHUB_OUTPUT"
          echo "owner_lc=${OWNER_LC}" >> "$GITHUB_ENV"

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ${{ env.REGISTRY }}/${{ env.owner_lc }}/redis-web
            ${{ env.REGISTRY }}/${{ env.owner_lc }}/webdis
          tags: |
            type=ref,event=branch
            type=ref,event=tag
            type=sha,prefix=
          flavor: |
            latest=auto

      - name: Build and push Docker images
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          file: ./docker/Dockerfile
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64

      - name: Prepare image vars for cosign
        if: env.COSIGN_KEY != ''
        run: |
          echo "IMAGE_NAME=ghcr.io/${{ env.owner_lc }}/redis-web" >> "$GITHUB_ENV"
          echo "LEGACY_IMAGE_NAME=ghcr.io/${{ env.owner_lc }}/webdis" >> "$GITHUB_ENV"
          if [[ "${{ github.event_name }}" == "release" ]]; then
            echo "IMAGE_TAG=${{ github.event.release.tag_name }}" >> "$GITHUB_ENV"
          else
            echo "IMAGE_TAG=$(echo ${{ github.sha }} | cut -c1-7)" >> "$GITHUB_ENV"
          fi

      - name: Install cosign
        if: env.COSIGN_KEY != ''
        uses: sigstore/cosign-installer@v3

      - name: Decode COSIGN key
        if: env.COSIGN_KEY != ''
        run: |
          echo "${COSIGN_KEY}" | base64 --decode > "$HOME/cosign.key"
          chmod 600 "$HOME/cosign.key"

      - name: Sign images with cosign
        if: env.COSIGN_KEY != ''
        run: |
          cosign sign --key "$HOME/cosign.key" "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          cosign sign --key "$HOME/cosign.key" "${{ env.IMAGE_NAME }}:latest"
          cosign sign --key "$HOME/cosign.key" "${{ env.LEGACY_IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          cosign sign --key "$HOME/cosign.key" "${{ env.LEGACY_IMAGE_NAME }}:latest"
