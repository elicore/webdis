name: Build & push Docker image (GHCR)

on:
  push:
    tags:
      - 'v*.*.*'
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: build-and-push-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      COSIGN_KEY: ${{ secrets.COSIGN_KEY }}
      COSIGN_PASSWORD: ${{ secrets.COSIGN_PASSWORD }}
    outputs:
      image_digest: ${{ steps.build-and-push.outputs.digest }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image tag variables
        id: vars
        run: |
          OWNER_LC="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          IMAGE_NAME="ghcr.io/${OWNER_LC}/redis-web"
          LEGACY_IMAGE_NAME="ghcr.io/${OWNER_LC}/webdis"
          echo "IMAGE_NAME=${IMAGE_NAME}" >> "$GITHUB_ENV"
          echo "LEGACY_IMAGE_NAME=${LEGACY_IMAGE_NAME}" >> "$GITHUB_ENV"
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            TAG_NAME="${GITHUB_REF#refs/tags/}"
            echo "IMAGE_TAG=${TAG_NAME}" >> "$GITHUB_ENV"
          else
            SHORT_SHA="$(echo "${GITHUB_SHA}" | cut -c1-7)"
            echo "IMAGE_TAG=${SHORT_SHA}" >> "$GITHUB_ENV"
          fi
          # Put tags into a comma-separated value so docker/build-push-action receives them properly
          echo "TAGS=${IMAGE_NAME}:${IMAGE_TAG},${IMAGE_NAME}:latest,${LEGACY_IMAGE_NAME}:${IMAGE_TAG},${LEGACY_IMAGE_NAME}:latest" >> "$GITHUB_ENV"

      - name: Build and push Docker images
        id: build-and-push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          file: ./docker/Dockerfile
          tags: ${{ env.TAGS }}
          platforms: linux/amd64,linux/arm64

      - name: Install cosign
        if: ${{ env.COSIGN_KEY != '' }}
        uses: sigstore/cosign-installer@v3

      - name: Decode COSIGN key
        if: ${{ env.COSIGN_KEY != '' }}
        run: |
          echo "${COSIGN_KEY}" | base64 --decode > "$HOME/cosign.key"
          chmod 600 "$HOME/cosign.key"

      - name: Sign images with cosign
        if: ${{ env.COSIGN_KEY != '' }}
        run: |
          cosign sign --key "$HOME/cosign.key" "${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          cosign sign --key "$HOME/cosign.key" "${{ env.IMAGE_NAME }}:latest"
          cosign sign --key "$HOME/cosign.key" "${{ env.LEGACY_IMAGE_NAME }}:${{ env.IMAGE_TAG }}"
          cosign sign --key "$HOME/cosign.key" "${{ env.LEGACY_IMAGE_NAME }}:latest"

      - name: Output digest
        run: |
          echo "image_digest=${{ steps.build-and-push.outputs.digest }}" >> "$GITHUB_OUTPUT"
